<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Lexington — Deployment</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#000626;--surface:#050d33;--surface2:#0c1657;--border:#1d2b78;--accent:#00ffff;--indigo:#3d5bf2;--text:#e5e9ff;--muted:#8893c9;
  --z-lobby:#00ffff;--z-hubmaster:#5b7bff;--z-hub:#a8ff3e;--z-flex:#ff4da6;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:radial-gradient(1400px 700px at 50% -10%,rgba(61,91,242,.22),transparent 60%),var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;height:100vh;overflow:hidden;padding:10px 14px 8px;display:flex;flex-direction:column;gap:8px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(61,91,242,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(61,91,242,.05) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at 50% 0%,#000 55%,transparent 95%);-webkit-mask-image:radial-gradient(circle at 50% 0%,#000 55%,transparent 95%);pointer-events:none;z-index:0;}
.tvwrap{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;gap:8px;min-height:0;}

/* HEADER */
.tv-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:8px;border-bottom:1px solid rgba(61,91,242,.4);position:relative;}
.tv-head::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;border-radius:2px;background:linear-gradient(90deg,#00ffff,#3d5bf2 50%,#ff00ff);opacity:.6;}
.tv-brand{display:flex;align-items:center;gap:10px;}
.tv-wordmark{font-family:'Anton',sans-serif;font-size:clamp(22px,3vw,42px);letter-spacing:2px;line-height:1;background:linear-gradient(90deg,#00ffff,#3d5bf2 50%,#ff00ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.tv-loc{font-family:'Space Mono',monospace;font-size:clamp(9px,.85vw,13px);font-weight:700;letter-spacing:3px;color:#000626;background:var(--accent);padding:3px 9px;border-radius:5px;align-self:center;}
.tv-meta{text-align:right;line-height:1.2;}
.tv-date{font-family:'Anton',sans-serif;font-size:clamp(14px,1.8vw,26px);letter-spacing:1px;}
.tv-shift{color:var(--accent);}
.tv-locked{font-family:'Space Mono',monospace;font-size:clamp(9px,.8vw,12px);color:var(--muted);margin-top:2px;}

/* ANNOUNCEMENT */
.tv-ann{background:linear-gradient(135deg,rgba(0,255,255,.09),rgba(0,255,255,.03));border:1px solid rgba(0,255,255,.3);border-radius:10px;padding:6px 14px;display:flex;align-items:baseline;gap:10px;}
.tv-ann-label{font-family:'Space Mono',monospace;font-size:clamp(9px,.75vw,11px);color:var(--accent);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.tv-ann-text{font-size:clamp(12px,1.2vw,18px);line-height:1.3;}

/* ZONE LAYOUT */
.tv-main{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0;}
.tv-zones{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1;min-height:0;}
@media(max-width:900px){.tv-zones{grid-template-columns:repeat(2,1fr);}}
.zone{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;min-height:0;overflow:hidden;transition:all .3s;}
.zone-hd{display:flex;align-items:center;justify-content:space-between;gap:6px;padding-bottom:7px;margin-bottom:7px;border-bottom:2px solid currentColor;}
.zone-name{font-family:'Anton',sans-serif;font-size:clamp(14px,1.6vw,24px);letter-spacing:1.5px;line-height:1;}
.zone.live{box-shadow:0 0 0 2px currentColor,0 0 20px -6px currentColor;}
.live-dot{display:none;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:clamp(8px,.65vw,10px);font-weight:700;letter-spacing:2px;}
.zone.live .live-dot{display:inline-flex;}
.live-dot i{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;animation:pls 1.6s infinite;}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.25}}
.people{display:flex;flex-direction:column;gap:7px;overflow:hidden;}
.person{padding:6px 8px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid currentColor;}
.p-name{font-size:clamp(13px,1.4vw,22px);font-weight:600;line-height:1.1;}
.p-time{font-family:'Space Mono',monospace;font-size:clamp(10px,.9vw,14px);color:var(--text);margin-top:1px;opacity:.85;}
.p-break{font-family:'Space Mono',monospace;font-size:clamp(9px,.8vw,13px);color:var(--gold);margin-top:1px;}
.p-live-pip{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;margin-right:6px;vertical-align:middle;animation:pls 1.6s infinite;}
.person-live .p-name{font-weight:700;}
.person-past{opacity:.35;filter:saturate(0.3);}
.zone-empty{color:var(--muted);font-size:clamp(11px,1vw,15px);font-style:italic;padding:4px 0;}

/* ROSTER STRIP */
.tv-roster{display:flex;flex-wrap:wrap;gap:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;align-items:center;}
.tv-roster-label{font-family:'Space Mono',monospace;font-size:clamp(9px,.8vw,11px);color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-right:4px;white-space:nowrap;}
.roster-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:6px 14px;}
.roster-pill.on-now{border-color:var(--accent);box-shadow:0 0 10px rgba(0,255,255,.18);}
.rp-shift{font-family:'Space Mono',monospace;font-size:clamp(9px,.75vw,11px);font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:1px;}
.rp-shift.open{background:rgba(0,255,255,.15);color:var(--accent);}
.rp-shift.mid{background:rgba(61,91,242,.2);color:#8da4ff;}
.rp-shift.close{background:rgba(255,77,109,.15);color:#ff4d6d;}
.rp-name{font-size:clamp(13px,1.3vw,20px);font-weight:700;}
.rp-time{font-family:'Space Mono',monospace;font-size:clamp(10px,.9vw,14px);color:var(--muted);}
.rp-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pls 1.6s infinite;flex-shrink:0;}

/* COACH CARD */
.zone-coach{background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.3);border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.zone-coach-hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:7px;border-bottom:2px solid var(--gold);}
.zone-coach-name{font-family:'Anton',sans-serif;font-size:clamp(14px,1.6vw,24px);letter-spacing:1.5px;color:var(--gold);}
.coach-groups{display:flex;flex-wrap:wrap;gap:8px;}
.coach-group{background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.2);border-radius:8px;padding:7px 12px;display:flex;flex-direction:column;gap:2px;min-width:160px;}
.cg-name{font-size:clamp(13px,1.3vw,20px);font-weight:700;color:var(--gold);}
.cg-detail{font-family:'Space Mono',monospace;font-size:clamp(9px,.85vw,13px);color:var(--muted);}
.cg-coach{font-size:clamp(11px,1vw,15px);color:var(--text);font-weight:600;}
.coach-empty{color:var(--muted);font-size:clamp(11px,1vw,15px);font-style:italic;}

/* FOOTER */
.tv-foot{display:flex;align-items:center;justify-content:space-between;font-family:'Space Mono',monospace;font-size:clamp(9px,.8vw,12px);color:var(--muted);padding-top:4px;}
.fresh-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--z-hub);box-shadow:0 0 6px var(--z-hub);margin-right:6px;vertical-align:middle;}
.fresh-stale{background:#ff4d6d!important;box-shadow:0 0 6px #ff4d6d!important;}

/* EMPTY STATE */
.tv-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;}
.tv-empty h2{font-family:'Anton',sans-serif;font-size:clamp(28px,4vw,60px);letter-spacing:2px;color:var(--muted);}
.tv-empty p{font-size:clamp(13px,1.3vw,20px);color:var(--muted);}
</style>
</head>
<body>
<div class="tvwrap" id="tvwrap">
  <div class="tv-empty"><h2>Loading…</h2></div>
</div>

<script>
const SB_URL='https://pemmhbdggpgzykljchel.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlbW1oYmRnZ3BnenlrbGpjaGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDczNjgsImV4cCI6MjA4NzYyMzM2OH0.yPgAcVlfExTWxqcIPwpcCvOa6WosfLn7ha14edu1XMA';
const LOCATION_ID=(new URLSearchParams(location.search).get('loc')||'lexington').toLowerCase();
function prettyLoc(id){return id.split('-').map(w=>w?w[0].toUpperCase()+w.slice(1):w).join(' ');}
const ZONES=['Lobby','Hub Master','Hub','Flex'];
const ZONE_VAR={'Lobby':'--z-lobby','Hub Master':'--z-hubmaster','Hub':'--z-hub','Flex':'--z-flex'};
let lastSig=null, lastState=null;

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function parseMin(t){if(!t)return null;const m=String(t).trim().match(/^(\d{1,2})(?::(\d{2}))?\s*([AaPp][Mm])?$/);if(!m)return null;let h=parseInt(m[1],10);const mn=m[2]?parseInt(m[2],10):0;const ap=m[3]?m[3].toLowerCase():null;if(ap){if(h===12)h=0;if(ap==='pm')h+=12;}return h*60+mn;}
function minToTime(m){if(m==null)return'';let h=Math.floor(m/60),mn=m%60;const ap=h>=12?'PM':'AM';if(h>12)h-=12;if(h===0)h=12;return h+':'+(mn<10?'0':'')+mn+' '+ap;}
function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes();}

function fmtDate(ds){if(!ds)return'';const p=String(ds).split('-');if(p.length!==3)return ds;const d=new Date(+p[0],+p[1]-1,+p[2]);return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function fmtClock(iso){if(!iso)return'';try{return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}catch(e){return'';}}
function minsAgo(iso){if(!iso)return null;try{return Math.max(0,Math.round((Date.now()-new Date(iso).getTime())/60000));}catch(e){return null;}}

// current area for a person given the time now
function currentArea(emp){
  const dep=emp.deployment||[];
  if(!dep.length)return null;
  let area=dep[0].area, nm=nowMin();
  for(let i=1;i<dep.length;i++){const at=parseMin(dep[i].at);if(at!=null&&nm>=at)area=dep[i].area;}
  return area;
}
function isOnNow(emp){
  const s=parseMin(emp.startTime), e=parseMin(emp.endTime), nm=nowMin();
  if(s==null||e==null)return false;
  return nm>=s&&nm<=e;
}
function timeRange(emp){
  const s=emp.startTime||'', e=emp.endTime||'';
  if(s&&e)return s+' – '+e;
  return s||e||'';
}

function render(st){
  const wrap=document.getElementById('tvwrap');
  if(!st||!st.current_deployment||!Array.isArray(st.current_deployment)||!st.current_deployment.length){
    wrap.innerHTML='<div class="tv-empty"><h2>Deployment not yet set</h2><p>Today’s deployment hasn’t been locked. Check back shortly.</p></div>';
    return;
  }
  const roster=st.current_deployment;
  const locName=(st.location_name||prettyLoc(LOCATION_ID)).toUpperCase();
  const shift=st.shift_type?(' • '+esc(st.shift_type)):'';
  const lockedLine=st.last_locked_by?('Locked by '+esc(st.last_locked_by)+(st.last_locked_at?' at '+fmtClock(st.last_locked_at):'')):'';

  const extras=roster.filter(e=>!(e.deployment&&e.deployment[0]&&ZONES.includes(e.deployment[0].area)));

  // Build per-zone assignments: each person appears in every zone they work
  const zoneAssignments = {}; // zone -> [{name, zoneStart, zoneEnd, breakTime, isLive}]
  ZONES.forEach(z => zoneAssignments[z] = []);
  const nm = nowMin();

  roster.forEach(e => {
    const dep = e.deployment || [];
    if (!dep.length) return;
    // Build segments: [{area, start, end}]
    const segs = dep.map((d, i) => {
      const start = i === 0 ? (e.startTime || null) : (d.at || null);
      const end = i < dep.length - 1 ? (dep[i+1].at || null) : (e.endTime || null);
      return {area: d.area, start, end};
    });
    segs.forEach(seg => {
      if (!seg.area || !zoneAssignments[seg.area]) return;
      const segStartMin = parseMin(seg.start);
      const segEndMin = parseMin(seg.end);
      const breakMin = parseMin(e.breakTime);
      const isLive = segStartMin != null && nm >= segStartMin && (segEndMin == null || nm <= segEndMin);
      const isPast = segEndMin != null && nm > segEndMin;
      zoneAssignments[seg.area].push({
        name: e.name || '',
        zoneStart: seg.start,
        zoneEnd: seg.end,
        breakTime: e.breakTime || null,
        isLive, isPast,
        _sortMin: segStartMin ?? 9999
      });
    });
  });

  const zoneHtml = ZONES.map(z => {
    const cv = 'var(' + ZONE_VAR[z] + ')';
    const assignments = zoneAssignments[z].sort((a,b) => a._sortMin - b._sortMin);
    const zoneIsLive = assignments.some(a => a.isLive);
    const people = assignments.map(a => {
      const timeStr = [a.zoneStart, a.zoneEnd].filter(Boolean).join(' – ');
      const breakLabel = a.breakTime ? `<div class="p-break">Break ${esc(a.breakTime)}</div>` : '';
      const livePip = a.isLive ? `<span class="p-live-pip"></span>` : '';
      const cls = a.isLive ? ' person-live' : a.isPast ? ' person-past' : '';
      return `<div class="person${cls}">
        <div class="p-name">${livePip}${esc(a.name)}</div>
        ${timeStr ? `<div class="p-time">${esc(timeStr)}</div>` : ''}
        ${breakLabel}
      </div>`;
    }).join('') || '<div class="zone-empty">No one assigned</div>';
    return `<div class="zone${zoneIsLive?' live':''}" style="color:${cv}">
      <div class="zone-hd"><span class="zone-name">${z.toUpperCase()}</span><span class="live-dot"><i></i>LIVE</span></div>
      <div class="people" style="color:var(--text)">${people}</div>
    </div>`;
  }).join('');

  const annHtml=(st.announcement&&st.announcement.trim())?`<div class="tv-ann"><div class="tv-ann-label">&#128226; Announcement</div><div class="tv-ann-text">${esc(st.announcement)}</div></div>`:'';

  // Roster strip — detect shift type by relative start/end times
  const rosterSorted = [...roster].sort((a,b)=>(parseMin(a.startTime)??9999)-(parseMin(b.startTime)??9999));
  const startMins = rosterSorted.map(e=>parseMin(e.startTime)).filter(v=>v!=null);
  const endMins = rosterSorted.map(e=>parseMin(e.endTime)).filter(v=>v!=null);
  const minStart = startMins.length ? Math.min(...startMins) : null;
  const maxEnd = endMins.length ? Math.max(...endMins) : null;
  const now = nowMin();

  const rosterPills = rosterSorted.map(e=>{
    const s=parseMin(e.startTime), en=parseMin(e.endTime);
    const onNow = s!=null && now>=s && (en==null||now<=en);
    const times = [e.startTime, e.endTime].filter(Boolean).join(' – ');
    // shift type: opener if earliest start, closer if latest end, mid otherwise
    let shiftType='mid';
    if(s!=null && s===minStart) shiftType='open';
    else if(en!=null && en===maxEnd) shiftType='close';
    return `<div class="roster-pill${onNow?' on-now':''}">
      ${onNow?'<span class="rp-dot"></span>':''}
      <span class="rp-shift ${shiftType}">${shiftType==='open'?'O':shiftType==='close'?'C':'M'}</span>
      <span class="rp-name">${esc(e.name||'')}</span>
      ${times?`<span class="rp-time">${esc(times)}</span>`:''}
    </div>`;
  }).join('');

  // Coach card — groups today
  const groups = Array.isArray(st.groups_today) ? st.groups_today : [];
  const coachCardHtml = `<div class="zone-coach">
    <div class="zone-coach-hd">
      <span class="zone-coach-name">ACTIVATE COACH</span>
      <span class="live-dot" style="${groups.length?'display:inline-flex':'display:none'}"><i style="background:var(--gold);box-shadow:0 0 6px var(--gold);"></i><span style="color:var(--gold);">GROUPS TODAY</span></span>
    </div>
    ${groups.length
      ? `<div class="coach-groups">${groups.map(g=>{
          const arr=parseMin(g.arrival);
          const play=parseInt(g.playtime)||0;
          const coachStart=arr!=null&&play?minToTime(arr-15):null;
          const coachEnd=arr!=null&&play?minToTime(arr+play+(g.hasLounge?60:0)+15):null;
          const totalMin=arr!=null&&play?(play+(g.hasLounge?60:0)+30):null;
          return `<div class="coach-group">
            <div class="cg-name">${esc(g.name||'Group')}</div>
            ${coachStart?`<div class="cg-detail" style="color:var(--gold);font-size:clamp(11px,1.1vw,17px);">${esc(coachStart)} &rarr; ${esc(coachEnd)}<span style="opacity:.6;margin-left:6px;">${totalMin} min</span></div>`:''}
            <div class="cg-detail">${[g.arrival?'Arrival '+esc(g.arrival):'', play?play+' min play':'', g.hasLounge?'+60 min lounge':''].filter(Boolean).join(' &middot; ')}</div>
            ${g.coach?`<div class="cg-coach">${esc(g.coach)}</div>`:''}
          </div>`;
        }).join('')}</div>`
      : `<div class="coach-empty">No groups scheduled today.</div>`
    }
  </div>`;

  const ma=minsAgo(st.last_locked_at);
  const stale=ma!=null&&ma>180;
  const freshTxt=ma==null?'':(ma===0?'Updated just now':('Updated '+ma+' min ago'));

  wrap.innerHTML=`
    <div class="tv-head">
      <div class="tv-brand"><span class="tv-wordmark">ACTIVATE</span><span class="tv-loc">${esc(locName)}</span></div>
      <div class="tv-meta">
        <div class="tv-date">${fmtDate(st.shift_date)}<span class="tv-shift">${shift}</span></div>
        ${lockedLine?`<div class="tv-locked">${lockedLine}</div>`:''}
      </div>
    </div>
    ${annHtml}
    <div class="tv-roster"><span class="tv-roster-label">Today's Roster</span>${rosterPills}</div>
    <div class="tv-main">
      <div class="tv-zones">${zoneHtml}</div>
      ${coachCardHtml}
    </div>
    <div class="tv-foot">
      <span>ACTIVATE DEPLOYMENT • BREAK ROOM DISPLAY</span>
      <span><span class="fresh-dot${stale?' fresh-stale':''}"></span>${freshTxt}</span>
    </div>`;
}

async function poll(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/tv_state?select=*&location_id=eq.${LOCATION_ID}&order=last_locked_at.desc&limit=1`,
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const rows=await r.json();
    const st=Array.isArray(rows)&&rows[0]?rows[0]:null;
    const sig=JSON.stringify(st);
    if(sig!==lastSig){ lastSig=sig; lastState=st; render(st); }
  }catch(e){ console.warn('TV poll error',e); }
}

// refresh freshness label + live highlights every 30s even if data unchanged
poll();
setInterval(poll,30000);
setInterval(()=>{ if(lastState) render(lastState); },30000);
</script>
</body>
</html>
