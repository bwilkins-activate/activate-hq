<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate — TV Control</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#000626;--surface:#050d33;--surface2:#0c1657;--border:#1d2b78;--accent:#00ffff;--indigo:#3d5bf2;--accent2:#ff4d6d;--accent3:#a8ff3e;--text:#e5e9ff;--muted:#8893c9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:radial-gradient(1200px 620px at 50% -12%,rgba(61,91,242,.20),transparent 60%),var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;}
.wordmark{font-family:'Anton',sans-serif;letter-spacing:2px;background:linear-gradient(90deg,#00ffff,#3d5bf2 50%,#ff00ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.pill{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:3px;color:#000626;background:var(--accent);padding:3px 9px;border-radius:5px;}
input,select,button,textarea{font-family:'Space Grotesk',sans-serif;}
input[type=text],input[type=email],input[type=password],input[type=number],select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,255,.12);}
.lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.btn{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(90deg,#00ffff,#ff00ff);color:#000626;font-weight:700;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:transparent;border:1px solid var(--accent2);color:var(--accent2);}
.btn-danger:hover{background:var(--accent2);color:#fff;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* LOGIN */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:50;}
#login .box{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:34px 30px;box-shadow:0 24px 70px rgba(0,4,30,.6),0 0 0 1px rgba(61,91,242,.18);}
#login .box>*+*{margin-top:14px;}
#loginErr{display:none;background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.3);color:var(--accent2);border-radius:8px;padding:10px 14px;font-size:13px;}

/* APP */
#app{display:none;max-width:1280px;margin:0 auto;padding:0 18px 60px;}
header{position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 0 16px;border-bottom:1px solid rgba(61,91,242,.35);flex-wrap:wrap;}
header::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;border-radius:2px;background:linear-gradient(90deg,#00ffff,#3d5bf2 50%,#ff00ff);opacity:.55;}
.whoami{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:12px;}
.layout{display:grid;grid-template-columns:240px 1fr;gap:18px;margin-top:18px;align-items:start;}
@media(max-width:820px){.layout{grid-template-columns:1fr;}}
.side{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px;max-height:78vh;overflow:auto;}
.side h3{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 10px 6px;}
.loc-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;background:transparent;border:none;color:var(--text);font-size:13px;font-weight:500;padding:9px 11px;border-radius:8px;cursor:pointer;transition:background .12s;}
.loc-btn:hover{background:var(--surface2);}
.loc-btn.active{background:var(--accent);color:#000626;font-weight:700;}
.loc-btn .cnt{font-family:'Space Mono',monospace;font-size:10px;opacity:.7;}
.loc-btn.global{color:var(--accent3);}
.loc-btn.global.active{background:var(--accent3);color:#000626;}
.sep{height:1px;background:var(--border);margin:8px 4px;}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;min-height:300px;}
.panel-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.panel-hd h2{font-family:'Anton',sans-serif;font-size:24px;letter-spacing:1px;}
.panel-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.saved{font-family:'Space Mono',monospace;font-size:12px;color:var(--accent3);opacity:0;transition:opacity .2s;}
.saved.show{opacity:1;}

.slide{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;display:grid;grid-template-columns:auto 1fr;gap:14px;}
.slide.off{opacity:.55;}
.slide-ord{display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:flex-start;}
.ord-btn{width:28px;height:24px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:12px;}
.ord-btn:hover{border-color:var(--accent);color:var(--accent);}
.ord-num{font-family:'Anton',sans-serif;font-size:18px;color:var(--accent);}
.slide-body{display:flex;flex-direction:column;gap:10px;min-width:0;}
.row3{display:grid;grid-template-columns:160px 1fr 110px;gap:10px;}
@media(max-width:680px){.row3{grid-template-columns:1fr;}}
.kind-badge{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1px solid;}
.kb-deployment{color:var(--accent);border-color:rgba(0,255,255,.4);background:rgba(0,255,255,.08);}
.kb-image{color:var(--accent3);border-color:rgba(168,255,62,.4);background:rgba(168,255,62,.08);}
.kb-url{color:#c084fc;border-color:rgba(192,132,252,.4);background:rgba(192,132,252,.08);}
.thumb{max-height:60px;max-width:120px;border-radius:6px;border:1px solid var(--border);}
.slide-foot{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;}
.toggle input{width:16px;height:16px;accent-color:var(--accent3);cursor:pointer;}
.dur{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.dur input{width:72px;}
.upload-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.file-btn{position:relative;overflow:hidden;}
.file-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.empty-note{color:var(--muted);font-size:13px;padding:18px 0;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:60;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;display:none;box-shadow:0 10px 30px rgba(0,4,30,.6);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <div style="text-align:center;margin-bottom:6px;">
      <div class="wordmark" style="font-size:40px;">ACTIVATE</div>
      <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px;">TV Control &mdash; Ops / IT</div>
    </div>
    <div id="loginErr"></div>
    <div><div class="lbl">Email</div><input type="email" id="email" placeholder="you@activate.games" autocomplete="username"></div>
    <div><div class="lbl">Password</div><input type="password" id="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" id="signinBtn" onclick="signIn()">Sign in &#8594;</button>
    <div style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;text-align:center;">Accounts are created by IT in Supabase.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="wordmark" style="font-size:30px;">ACTIVATE</span>
      <span class="pill">TV CONTROL</span>
    </div>
    <div class="whoami"><span id="whoami"></span><button class="btn btn-ghost" style="padding:6px 12px;" onclick="signOut()">Sign out</button></div>
  </header>

  <div class="layout">
    <div class="side">
      <h3>Locations</h3>
      <div id="locList"></div>
    </div>
    <div class="panel" id="panel"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://pemmhbdggpgzykljchel.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlbW1oYmRnZ3BnenlrbGpjaGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDczNjgsImV4cCI6MjA4NzYyMzM2OH0.yPgAcVlfExTWxqcIPwpcCvOa6WosfLn7ha14edu1XMA';
const GLOBAL='__global__';
let token=localStorage.getItem('dep_admin_token')||null;
let userEmail=localStorage.getItem('dep_admin_email')||'';
let locations=[], current=null, slides=[], gSlide={kind:'image',src:'',label:'',duration:30};

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function prettyLoc(id){return id.split('-').map(w=>w?w[0].toUpperCase()+w.slice(1):w).join(' ');}
function authHeaders(extra){return Object.assign({'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json'},extra||{});}
function readHeaders(){return token?{'apikey':SB_KEY,'Authorization':'Bearer '+token}:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};}
function toast(msg,kind){const t=document.getElementById('toast');t.textContent=msg;t.style.background=kind==='err'?'rgba(255,77,109,.18)':'rgba(168,255,62,.16)';t.style.border='1px solid '+(kind==='err'?'var(--accent2)':'var(--accent3)');t.style.color=kind==='err'?'var(--accent2)':'var(--accent3)';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3800);}

// ── AUTH ──
async function signIn(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const err=document.getElementById('loginErr');
  if(!email||!password){err.textContent='Enter email and password.';err.style.display='block';return;}
  const btn=document.getElementById('signinBtn');btn.disabled=true;btn.textContent='Signing in…';
  try{
    const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(!r.ok||!d.access_token){throw new Error(d.error_description||d.msg||'Invalid email or password.');}
    token=d.access_token; userEmail=(d.user&&d.user.email)||email;
    localStorage.setItem('dep_admin_token',token); localStorage.setItem('dep_admin_email',userEmail);
    err.style.display='none'; await showApp();
  }catch(e){ err.textContent=e.message||'Sign in failed.'; err.style.display='block'; }
  btn.disabled=false; btn.innerHTML='Sign in &#8594;';
}
function signOut(){token=null;userEmail='';localStorage.removeItem('dep_admin_token');localStorage.removeItem('dep_admin_email');document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';}
function sessionExpired(){toast('Session expired — sign in again','err');signOut();}

async function showApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('whoami').textContent=userEmail;
  await loadLocations();
}

// ── LOCATIONS ──
async function loadLocations(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/access_keys?select=location_id,location_name`,{headers:readHeaders()});
    if(r.status===401)return sessionExpired();
    const rows=await r.json();
    const map={};
    (Array.isArray(rows)?rows:[]).forEach(x=>{ if(x.location_id&&!map[x.location_id]) map[x.location_id]=x.location_name||prettyLoc(x.location_id); });
    locations=Object.keys(map).sort().map(id=>({id,name:map[id]}));
    renderLocList();
    selectTab(current||(locations[0]?locations[0].id:GLOBAL));
  }catch(e){console.error(e);toast('Could not load locations','err');}
}
function renderLocList(){
  const el=document.getElementById('locList');
  let html=`<button class="loc-btn global${current===GLOBAL?' active':''}" onclick="selectTab('${GLOBAL}')">⊕ Global / All locations</button><div class="sep"></div>`;
  if(!locations.length){ html+='<div class="empty-note" style="padding:10px;">No locations yet. A manager creates one by setting up the deployment app.</div>'; }
  html+=locations.map(l=>`<button class="loc-btn${current===l.id?' active':''}" onclick="selectTab('${l.id}')"><span>${esc(l.name)}</span></button>`).join('');
  el.innerHTML=html;
}

// ── SLIDES (per location) ──
async function selectTab(loc){
  current=loc; renderLocList();
  if(loc===GLOBAL){ renderGlobal(); return; }
  document.getElementById('panel').innerHTML='<div class="empty-note">Loading…</div>';
  try{
    const r=await fetch(`${SB_URL}/rest/v1/tv_slides?location_id=eq.${encodeURIComponent(loc)}&order=position.asc&select=*`,{headers:readHeaders()});
    if(r.status===401)return sessionExpired();
    let rows=await r.json();
    slides=(Array.isArray(rows)?rows:[]).map(x=>({kind:x.kind||'image',src:x.src||'',label:x.label||'',duration:x.duration||30,enabled:x.enabled!==false}));
    if(!slides.length) slides=[{kind:'deployment',src:'',label:'Live deployment',duration:30,enabled:true}];
    renderSlides();
  }catch(e){console.error(e);document.getElementById('panel').innerHTML='<div class="empty-note">Could not load slides.</div>';}
}

function kindBadge(k){const m={deployment:'kb-deployment',image:'kb-image',url:'kb-url'};const t={deployment:'Live deployment',image:'Image',url:'Web link'};return `<span class="kind-badge ${m[k]||'kb-image'}">${t[k]||k}</span>`;}

function renderSlides(){
  const name=(locations.find(l=>l.id===current)||{}).name||prettyLoc(current);
  const tvUrl='tv.html?loc='+encodeURIComponent(current);
  let body='';
  if(!slides.length){ body='<div class="empty-note">No slides. Add one below — the TV will show the live deployment by default.</div>'; }
  else body=slides.map((s,i)=>slideCard(s,i)).join('');
  document.getElementById('panel').innerHTML=`
    <div class="panel-hd">
      <h2>${esc(name)}</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="saved" id="savedMsg">Saved ✓</span>
        <a class="btn btn-ghost" href="${tvUrl}" target="_blank" style="text-decoration:none;">Preview TV &#8599;</a>
        <button class="btn btn-primary" onclick="saveSlides()">Save</button>
      </div>
    </div>
    <div class="panel-sub">Slides rotate top to bottom on this location's TV. Drag order with ▲▼. Toggle off to hide without deleting.</div>
    <div id="slideList">${body}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
      <button class="btn btn-ghost" onclick="addSlide('image')">＋ Image</button>
      <button class="btn btn-ghost" onclick="addSlide('url')">＋ Web link</button>
      <button class="btn btn-ghost" onclick="addSlide('deployment')">＋ Live deployment</button>
    </div>`;
}

function slideCard(s,i){
  let srcUI='';
  if(s.kind==='deployment'){
    srcUI=`<div style="font-size:12px;color:var(--muted);">Shows this location's live deployment page. No link needed.</div>`;
  }else if(s.kind==='image'){
    srcUI=`<div class="upload-row">
        ${s.src?`<img class="thumb" src="${esc(s.src)}" alt="">`:''}
        <button class="btn btn-ghost file-btn">Upload image<input type="file" accept="image/*" onchange="onUpload(${i},this)"></button>
        <input type="text" placeholder="…or paste an image URL" value="${esc(s.src)}" oninput="upd(${i},'src',this.value)" style="flex:1;min-width:180px;">
      </div>`;
  }else{
    srcUI=`<input type="text" placeholder="https://… (web page to display)" value="${esc(s.src)}" oninput="upd(${i},'src',this.value)">`;
  }
  return `<div class="slide${s.enabled?'':' off'}">
    <div class="slide-ord">
      <button class="ord-btn" onclick="move(${i},-1)" title="Up">▲</button>
      <div class="ord-num">${i+1}</div>
      <button class="ord-btn" onclick="move(${i},1)" title="Down">▼</button>
    </div>
    <div class="slide-body">
      <div class="row3">
        <select onchange="changeKind(${i},this.value)">
          <option value="deployment"${s.kind==='deployment'?' selected':''}>Live deployment</option>
          <option value="image"${s.kind==='image'?' selected':''}>Image</option>
          <option value="url"${s.kind==='url'?' selected':''}>Web link</option>
        </select>
        <input type="text" placeholder="Label (optional, for your reference)" value="${esc(s.label)}" oninput="upd(${i},'label',this.value)">
        <div class="dur">${kindBadge(s.kind)}</div>
      </div>
      ${srcUI}
      <div class="slide-foot">
        <label class="toggle"><input type="checkbox" ${s.enabled?'checked':''} onchange="upd(${i},'enabled',this.checked);this.closest('.slide').classList.toggle('off',!this.checked)"> Shown on TV</label>
        <span class="dur">Duration <input type="number" min="3" value="${s.duration}" oninput="upd(${i},'duration',parseInt(this.value)||30)"> sec</span>
        <button class="btn btn-danger" style="padding:5px 11px;margin-left:auto;" onclick="delSlide(${i})">Delete</button>
      </div>
    </div>
  </div>`;
}

function upd(i,field,val){ if(slides[i]) slides[i][field]=val; }
function changeKind(i,val){ slides[i].kind=val; if(val==='deployment')slides[i].src=''; renderSlides(); }
function move(i,dir){ const j=i+dir; if(j<0||j>=slides.length)return; const t=slides[i];slides[i]=slides[j];slides[j]=t; renderSlides(); }
function delSlide(i){ slides.splice(i,1); renderSlides(); }
function addSlide(kind){ slides.push({kind,src:'',label:'',duration:kind==='deployment'?30:(kind==='image'?20:60),enabled:true}); renderSlides(); }

async function onUpload(i,input){
  const file=input.files&&input.files[0]; if(!file)return;
  toast('Uploading image…');
  try{ const url=await uploadImage(file); slides[i].src=url; renderSlides(); toast('Image uploaded ✓'); }
  catch(e){ console.error(e); toast('Upload failed — check the storage bucket','err'); }
}
async function uploadImage(file){
  const safe=(file.name||'img').replace(/[^a-zA-Z0-9.\-_]/g,'_');
  const path=Date.now()+'-'+safe;
  const r=await fetch(`${SB_URL}/storage/v1/object/tv-slides/${encodeURIComponent(path)}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':file.type||'application/octet-stream'},body:file});
  if(r.status===401){sessionExpired();throw new Error('expired');}
  if(!r.ok) throw new Error(await r.text());
  return `${SB_URL}/storage/v1/object/public/tv-slides/${encodeURIComponent(path)}`;
}

async function saveSlides(){
  const loc=current;
  const clean=slides.filter(s=>s.kind==='deployment'||(s.src&&s.src.trim()));
  const rows=clean.map((s,i)=>({location_id:loc,position:i,kind:s.kind,src:s.kind==='deployment'?null:s.src.trim(),label:s.label||null,duration:Math.max(3,parseInt(s.duration)||30),enabled:!!s.enabled,updated_by:userEmail,updated_at:new Date().toISOString()}));
  try{
    const del=await fetch(`${SB_URL}/rest/v1/tv_slides?location_id=eq.${encodeURIComponent(loc)}`,{method:'DELETE',headers:authHeaders({'Prefer':'return=minimal'})});
    if(del.status===401)return sessionExpired();
    if(!del.ok) throw new Error(await del.text());
    if(rows.length){
      const ins=await fetch(`${SB_URL}/rest/v1/tv_slides`,{method:'POST',headers:authHeaders({'Prefer':'return=minimal'}),body:JSON.stringify(rows)});
      if(ins.status===401)return sessionExpired();
      if(!ins.ok) throw new Error(await ins.text());
    }
    const sm=document.getElementById('savedMsg'); if(sm){sm.classList.add('show');setTimeout(()=>sm.classList.remove('show'),2500);}
    toast('Saved ✓');
  }catch(e){console.error(e);toast('Save failed — '+(e.message||'try again'),'err');}
}

// ── GLOBAL PUSH ──
function renderGlobal(){
  let srcUI = gSlide.kind==='url'
    ? `<input type="text" id="gSrc" placeholder="https://… (web page to display)" value="${esc(gSlide.src)}" oninput="gSlide.src=this.value">`
    : `<div class="upload-row">${gSlide.src?`<img class="thumb" src="${esc(gSlide.src)}" alt="">`:''}<button class="btn btn-ghost file-btn">Upload image<input type="file" accept="image/*" onchange="onGlobalUpload(this)"></button><input type="text" placeholder="…or paste an image URL" value="${esc(gSlide.src)}" oninput="gSlide.src=this.value" style="flex:1;min-width:180px;"></div>`;
  document.getElementById('panel').innerHTML=`
    <div class="panel-hd"><h2 style="color:var(--accent3);">Global / All locations</h2></div>
    <div class="panel-sub">Compose one slide and push a copy to every location (${locations.length}). Each location can then reorder, hide, fix, or delete its copy from its own tab.</div>
    <div class="slide" style="grid-template-columns:1fr;">
      <div class="slide-body">
        <div class="row3">
          <select onchange="gSlide.kind=this.value;renderGlobal()">
            <option value="image"${gSlide.kind==='image'?' selected':''}>Image</option>
            <option value="url"${gSlide.kind==='url'?' selected':''}>Web link</option>
          </select>
          <input type="text" placeholder="Label (optional)" value="${esc(gSlide.label)}" oninput="gSlide.label=this.value">
          <span class="dur">Duration <input type="number" min="3" value="${gSlide.duration}" oninput="gSlide.duration=parseInt(this.value)||30"> sec</span>
        </div>
        ${srcUI}
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-primary" onclick="pushToAll()" ${locations.length?'':'disabled'}>Add to all ${locations.length} locations</button>
        </div>
      </div>
    </div>`;
}
async function onGlobalUpload(input){
  const file=input.files&&input.files[0]; if(!file)return;
  toast('Uploading image…');
  try{ gSlide.src=await uploadImage(file); renderGlobal(); toast('Image uploaded ✓'); }
  catch(e){ console.error(e); toast('Upload failed — check the storage bucket','err'); }
}
async function pushToAll(){
  if(!gSlide.src||!gSlide.src.trim()){toast('Add an image or link first','err');return;}
  let okCount=0;
  for(const l of locations){
    try{
      const r=await fetch(`${SB_URL}/rest/v1/tv_slides?location_id=eq.${encodeURIComponent(l.id)}&select=position&order=position.desc&limit=1`,{headers:readHeaders()});
      const rows=await r.json();
      const nextPos=(Array.isArray(rows)&&rows[0]&&typeof rows[0].position==='number')?rows[0].position+1:1;
      const row={location_id:l.id,position:nextPos,kind:gSlide.kind,src:gSlide.src.trim(),label:gSlide.label||null,duration:Math.max(3,parseInt(gSlide.duration)||30),enabled:true,updated_by:userEmail,updated_at:new Date().toISOString()};
      const ins=await fetch(`${SB_URL}/rest/v1/tv_slides`,{method:'POST',headers:authHeaders({'Prefer':'return=minimal'}),body:JSON.stringify(row)});
      if(ins.status===401){return sessionExpired();}
      if(ins.ok) okCount++;
    }catch(e){console.error('push',l.id,e);}
  }
  toast('Added to '+okCount+' of '+locations.length+' locations ✓');
  gSlide={kind:'image',src:'',label:'',duration:30}; renderGlobal();
}

// ── BOOT ──
if(token){ showApp(); } else { document.getElementById('login').style.display='flex'; }
</script>
</body>
</html>
